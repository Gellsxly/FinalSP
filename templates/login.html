{% extends 'base.html' %}

{% block title %}Masuk Akun | MindCare CF{% endblock %}

{% block content %}
<div class="container" style="padding-top: 5rem; padding-bottom: 5rem; display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="card" style="width: 100%; max-width: 450px; padding: 2.5rem; box-shadow: var(--shadow-xl);">
        
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="font-size: 2.5rem; color: var(--primary); margin-bottom: 0.5rem;">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h2 style="font-size: 1.75rem; font-weight: 800; color: #fff; margin-bottom: 0.25rem;">Selamat Datang</h2>
            <p style="color: var(--text-secondary); font-size: 0.95rem;">Masuk untuk melakukan konsultasi diagnosa</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST" style="display: flex; flex-direction: column; gap: 1.25rem;">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" name="email" id="email" class="form-control" placeholder="nama@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 0.5rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Masuk Sekarang
            </button>
        </form>

        <p style="text-align: center; font-size: 0.9rem; color: var(--text-secondary); margin-top: 2rem; margin-bottom: 0;">
            Belum punya akun? <a href="{{ url_for('register') }}" style="color: var(--primary); text-decoration: none; font-weight: 700;">Daftar di sini</a>
        </p>

    </div>
</div>
{% endblock %}
